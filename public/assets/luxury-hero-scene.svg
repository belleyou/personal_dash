<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
<title id="title">Liquid glass child portfolio hero</title><desc id="desc">A stylized child in a transparent orange raincoat holding an iridescent blue balloon, standing on a glass pedestal among flowers and cloud buttons.</desc>
